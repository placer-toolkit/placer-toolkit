<svg
    xmlns="http://www.w3.org/2000/svg"
    width="96"
    height="64"
    viewBox="0 0 96 16"
>
    <rect
        y="2"
        width="96"
        height="12"
        rx="6"
        fill="url(#color-picker-gradient)"
    />
    <rect
        x="61"
        y="1"
        width="14"
        height="14"
        rx="7"
        fill="var(--pc-color-blue-60)"
        stroke="var(--pc-color-surface-default)"
        stroke-width="2"
    />
    <defs>
        <linearGradient
            id="color-picker-gradient"
            x1="0"
            y1="8"
            x2="96"
            y2="8"
            gradientUnits="userSpaceOnUse"
        >
            <stop offset="0.04" stop-color="var(--pc-color-red-60)" />
            <stop offset="0.1667" stop-color="var(--pc-color-orange-60)" />
            <stop offset="0.3334" stop-color="var(--pc-color-yellow-60)" />
            <stop offset="0.5" stop-color="var(--pc-color-green-60)" />
            <stop offset="0.67" stop-color="var(--pc-color-blue-60)" />
            <stop offset="0.84" stop-color="var(--pc-color-indigo-60)" />
            <stop offset="1" stop-color="var(--pc-color-purple-60)" />
        </linearGradient>
    </defs>
</svg>
