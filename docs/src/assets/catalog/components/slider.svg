            x2="96"
            y2="10"
            gradientUnits="userSpaceOnUse"
        >
            <stop offset="0" stop-color="var(--pc-form-control-activated-color)" />
            <stop offset="0.729" stop-color="var(--pc-form-control-activated-color)" />
            <stop offset="0.729" stop-color="var(--pc-color-neutral-border-normal)" />
            <stop offset="1" stop-color="var(--pc-color-neutral-border-normal)" />
